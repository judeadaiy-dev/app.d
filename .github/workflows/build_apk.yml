name: Ultimate Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # تفعيل الكاش لتسريع البناء السحابي
      - name: Cache Flutter & Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-gradle-${{ hashFiles('**/pubspec.yaml', '**/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-flutter-gradle-
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Application & Force Export
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false"
        run: |
          flutter config --no-enable-web
          flutter clean
          flutter pub get
          
          # 🚀 بناء الصيغتين مع استخدام علم التخطي والتوافق المطلوب لـ AGP 8.9.1
          flutter build apk --debug --android-skip-build-dependency-validation
          flutter build appbundle --debug --android-skip-build-dependency-validation || true
          
          # قنص أي ملف apk أو aab تم توليده في أي مكان في السيرفر ونقله للمجلد الثابت
          mkdir -p my_output_artifacts
          find /home/runner/work/ -name "*.apk" -exec cp {} my_output_artifacts/ \;
          find /home/runner/work/ -name "*.aab" -exec cp {} my_output_artifacts/ \;
          
          echo "=== ملفات التطبيق المستخرجة والمضمونة ==="
          ls -la my_output_artifacts/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: final-app
          path: my_output_artifacts/*
