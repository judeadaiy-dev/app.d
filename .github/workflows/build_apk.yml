name: Pure Fixed Flutter Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. بيئة الجافا المستقرة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم وتطهير المشروع بالكامل
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter clean
          flutter pub get

      # 4. إعادة توليد هيكل أندرويد القياسي
      - name: Recreate Android Project
        run: |
          rm -rf android
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. حقن ملف local.properties بالمسارات القياسية للسيرفر
      - name: Configure Android SDK Properties
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          flutter.versionCode=1
          flutter.versionName=1.0.0
          EOF

      # 6. كتابة ملف build.gradle الرئيسي (Master) المتوافق مع الفلاتر الحديث والمكتبات
      - name: Inject Correct Master build.gradle
        run: |
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.8.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      # 7. كتابة ملف أندرويد للتطبيق (App build.gradle) بالطريقة القياسية الآمنة لـ 3.22.0
      - name: Inject Correct App build.gradle
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterCompileSdkVersion = localProperties.getProperty('flutter.compileSdkVersion')
          if (flutterCompileSdkVersion == null) {
              flutterCompileSdkVersion = '34'
          }

          def flutterMinSdkVersion = localProperties.getProperty('flutter.minSdkVersion')
          if (flutterMinSdkVersion == null) {
              flutterMinSdkVersion = '23'
          }

          def flutterTargetSdkVersion = localProperties.getProperty('flutter.targetSdkVersion')
          if (flutterTargetSdkVersion == null) {
              flutterTargetSdkVersion = '34'
          }

          android {
              namespace "com.judeadaiy.chat_app"
              compileSdkVersion flutterCompileSdkVersion.toInteger()
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "com.judeadaiy.chat_app"
                  minSdkVersion flutterMinSdkVersion.toInteger()
                  targetSdkVersion flutterTargetSdkVersion.toInteger()
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF

      # 8. ضبط ملف المانيفست بالصلاحيات الكاملة لتطبيق الشات
      - name: Fix Android Manifest File
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.judeadaiy.chat_app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application
                  android:label="op"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|screenLayout|density|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # 9. تفعيل دعم أندرويد إكس لتوافق مكتبات فحص الشبكة والصوت
      - name: Ensure AndroidX Properties
        run: |
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      # 10. أمر البناء النهائي الصافي
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 11. رفع ملف الـ APK الناتج للتحميل فوراً
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-ChatApp-Release
          path: build/app/outputs/flutter-apk/app-release.apk

