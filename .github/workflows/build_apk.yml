name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          # إضافة --android-skip-build-dependency-validation لتجاوز تحذيرات Gradle
          flutter build apk --release --split-per-abi --verbose --android-skip-build-dependency-validation
          
      - name: Check and Move Files
        run: |
          mkdir -p final_apk
          # البحث في المسار القياسي للـ APK ونقله
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} final_apk/ \; || echo "No APK found in standard path"
          
          # إذا فشل المسار القياسي، نبحث في كل المجلد كخطة طوارئ
          if [ -z "$(ls -A final_apk/)" ]; then
            echo "Searching in entire build directory..."
            find build -name "*.apk" -exec cp {} final_apk/ \;
          fi
          
          ls -R final_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/
