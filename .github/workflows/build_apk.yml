name: Smart Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا المتوافقة مع فلاتر 3.22 (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 2. تثبيت إصدار فلاتر المستقر المطلوب 3.22.0 مع تفعيل الكاش لتسريع البناء
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. جلب المكاتب والحزم الخاصة بالمشروع (من ضمنها مكاتب الصوت، supabase، و google_sign_in)
      - name: Install Dependencies
        run: flutter pub get

      # 4. إصلاح إعدادات الأندرويد وحقن مسارات الـ SDK والخصائص الهامة دون مسح المجلد
      - name: Inject SDK Paths & Android Properties
        run: |
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=23" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
          # تفعيل خصائص أندرويد الحديثة لتجنب مشاكل الذاكرة والمكتبات القديمة
          echo "android.useAndroidX=true" > android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # 5. التعديل الذكي على ملفات الجرادل (build.gradle) لفرض إصدار كوتلن متوافق مع المكاتب الحديثة
      - name: Patch Gradle and Kotlin Versions
        run: |
          # استبدال وتحديث إصدار Kotlin في ملف الجرادل الرئيسي لتفادي أخطاء حزم الصوت والتسجيل
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/g' android/build.gradle
            sed -i 's/kotlin("android") version .*/kotlin("android") version "1.9.24"/g' android/build.gradle
          fi

      # 6. بناء ملف الـ APK بالإعدادات الكاملة والمنصات المستهدفة
      - name: Build APK Release
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --no-tree-shake-icons

      # 7. رفع ملف الـ APK النهائي ليكون جاهزاً للتحميل مباشرة
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Latest-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
