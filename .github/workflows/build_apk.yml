name: Force Strict Overwrite & Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تثبيت الجافا المتوافقة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر (بدون كاش نهائياً)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. تأمين مسارات الموارد لـ pubspec
      - name: Secure Assets and Icon
        run: |
          mkdir -p assets/images
          if [ ! -f "assets/images/app_logo.png" ]; then
            touch assets/images/app_logo.png
          fi

      # 4. جلب مكاتب المشروع مع تصفية الكاش
      - name: Clean and Install Dependencies
        run: |
          flutter pub get
          flutter clean
          flutter pub get

      # 5. تنظيف كاش الأندرويد الداخلي بعنف ومسح المجلدات المؤقتة القديمة
      - name: Hard Clean Android Cache
        run: |
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -f android/local.properties

      # 6. جلب ملف الجرادل التنفيذي الأصلي مباشرة من السيرفر لضمان سلامته
      - name: Download Pure Gradle Wrapper Jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -Lo android/gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar

      # 7. إعطاء صلاحية التشغيل لملف الـ gradlew اليدوي
      - name: Give Permission to Custom Gradlew
        run: chmod +x android/gradlew

      # 8. 🚨 فرض كتابة ملف الـ MainActivity القياسي من السيرفر ليتخطى الخطأ مجبراً
      - name: Force Overwrite MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/judeadaiy/chat_app
          cat << 'EOF' > android/app/src/main/kotlin/com/judeadaiy/chat_app/MainActivity.kt
          package com.judeadaiy.chat_app

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      # 9. بناء جسر الـ SDK والجرادل ليرتبط بملف الـ settings.gradle الجديد
      - name: Configure Android SDK & Gradle Bridge
        run: |
          cat << 'EOF' > android/local.properties
          sdk.dir=/usr/local/lib/android/sdk
          flutter.sdk=/opt/hostedtoolcache/flutter/stable-3.22.0-x64/flutter
          flutter.compileSdkVersion=34
          flutter.minSdkVersion=23
          flutter.targetSdkVersion=34
          EOF

      # 10. أمر البناء النهائي الصارم والمباشر
      - name: Build APK Release
        run: |
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 11. رفع واستخراج الـ APK الجاهز تماماً للتثبيت
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeaChat-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
