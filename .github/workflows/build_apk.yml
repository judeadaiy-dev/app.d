name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          # إضافة flag لتجاوز تحذيرات الـ Gradle التي تعيق العملية
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation

      - name: Locate and Move APK
        run: |
          mkdir -p final_apk
          # هذا الأمر لا يعتمد على المسار الافتراضي، بل يمسح مجلد build بالكامل
          # ويجد أي ملف APK ويضعه في مجلد final_apk
          find build -name "*.apk" -exec cp {} final_apk/ \;
          ls -R final_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: final_apk/

