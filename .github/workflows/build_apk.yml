name: Pure Android Directory Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا المتوافقة مع ملفاتك
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات
      - name: Install Dependencies
        run: flutter pub get

      # 4. خطوة تأمينية فقط: كتابة مسار الـ SDK داخل ملف local.properties المرفوع لتوجيه الجرادل
      - name: Configure Flutter SDK Path
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      # 5. أمر البناء القياسي المباشر (سيعتمد 100% على مجلد android المرفوع في الصورة)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 6. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
