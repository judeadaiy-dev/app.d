name: Ultimate Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 🌟 الخطوة الجديدة: توليد أيقونات الأندرويد بجميع المقاسات تلقائياً
      - name: Generate Launcher Icons
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons

      - name: Build APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
        # تم تبسيط الأمر ليقوم ببناء ملف APK الافتراضي القياسي الشامل لجميع المعالجات
        run: |
          flutter config --no-enable-web
          flutter clean
          flutter pub get
          flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: final-app
          # البحث المتكامل في كل المجلدات الفرعية لضمان التقاط ملف الـ APK أينما وُضع
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/debug/*.apk
            **/build/app/outputs/flutter-apk/*.apk
