name: Smart Template Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. تهيئة بيئة الجافا الحديثة
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة محرك فلاتر المستقر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      # 3. جلب الحزم والمكتبات لتحليل متطلباتها
      - name: Install Dependencies
        run: flutter pub get

      # 4. توليد هيكل أندرويد الافتراضي تلقائياً
      - name: Auto-Generate Base Android Structure
        run: |
          flutter create . --platforms=android --org=com.judeadaiy

      # 5. السحر الحقيقي: استبدال الملفات الافتراضية بملفاتك الذكية المحدثة يدوياً
      - name: Inject Smart Custom Configurations
        run: |
          # 1. نسخ ملف الخصائص ومسار الـ SDK
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # 2. استبدال ملف settings.gradle الرئيسي
          cp android_config/settings.gradle android/settings.gradle
          
          # 3. استبدال ملف build.gradle الداخلي للتطبيق
          cp android_config/build.gradle android/app/build.gradle
          
          # 4. استبدال ملف إعدادات إصدار الجرادل
          cp android_config/gradle-wrapper.properties android/gradle/wrapper/gradle-wrapper.properties

      # 6. أمر البناء الصريح والنظيف (سيعتمد كلياً على ملفاتك الثلاثة المفرغتة)
      - name: Build APK Release
        run: |
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm,android-arm64,android-x64

      # 7. رفع ملف الـ APK النهائي للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Smart-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

