name: chat_app
description: تطبيق محادثة احترافي بـ Flutter و Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  supabase_flutter: ^2.5.0 # إصدار أقدم قليلاً وأكثر استقراراً
  
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.2.0

  google_fonts: ^6.2.1
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0

  image_picker: ^1.0.7 # نسخة متوافقة مع SDK 34
  cached_network_image: ^3.3.1
  
    # عدلي سطر intl ليصبح هكذا تماماً:
  intl: ^0.20.2
  timeago: ^3.5.0
  uuid: ^4.3.3
  
  permission_handler: ^11.0.1 # نسخة مستقرة لـ 34
  record: ^5.1.0 # نسخة لا تطلب إصدارات أندرويد حديثة جداً
  just_audio: ^0.9.36
  
  file_picker: ^8.0.3
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.0

# 🚨 الإبقاء على التجاوز الضروري
dependency_overrides:
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # توليد الأيقونة بكل المقاسات
  flutter_launcher_icons: ^0.14.0

# إعدادات الأيقونة للأندرويد فقط وحذف الـ ios تماماً
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true

  # مسار الصور
  assets:
    - assets/images/app_logo.png

  # مسارات الخطوط لضمان دمجها داخل الـ APK بنجاح
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
