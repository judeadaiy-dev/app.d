# إعدادات الذاكرة لحل مشكلة OutOfMemoryError
org.gradle.jvmargs=-Xmx3075m -XX:MaxMetaspaceSize=512m

# إيقاف الخادم الخلفي لتوفير الذاكرة في بيئات العمل المشتركة والسحابية
org.gradle.daemon=false

# مسار Flutter SDK الخاص ببيئتك
flutter.sdk=/workspaces/op/flutter

# الإعدادات الافتراضية لـ Flutter (لا تقم بحذفها إذا كانت موجودة مسبقاً)
android.useAndroidX=true
android.enableJetifier=true
